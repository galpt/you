name: Build and Release

on:
  push:
    branches:
    - main
    - master
    tags:
    - 'v*'
  workflow_dispatch:


permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
        - goos: windows
          goarch: amd64
          output: you.exe
          asset_name: you-windows-amd64.zip
        - goos: linux
          goarch: amd64
          output: you
          asset_name: you-linux-amd64.tar.gz
        - goos: darwin
          goarch: amd64
          output: you
          asset_name: you-darwin-amd64.tar.gz
        - goos: darwin
          goarch: arm64
          output: you
          asset_name: you-darwin-arm64.tar.gz

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build executable
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        go build -ldflags="-s -w" -o ${{ matrix.output }} .

    - name: Create distribution package
      run: |
        mkdir -p dist

        # Create package directory
        PKG_DIR="you-${{ matrix.goos }}-${{ matrix.goarch }}"
        mkdir -p "$PKG_DIR"

        # Copy binary
        cp ${{ matrix.output }} "$PKG_DIR/"

        # Copy documentation
        cp README.md "$PKG_DIR/"
        cp LICENSE "$PKG_DIR/"
        cp QUICKSTART.md "$PKG_DIR/"

        # Create archive based on platform
        if [ "${{ matrix.goos }}" = "windows" ]; then
          zip -r "dist/${{ matrix.asset_name }}" "$PKG_DIR"
        else
          tar -czf "dist/${{ matrix.asset_name }}" "$PKG_DIR"
        fi

        # Display archive info
        ls -lh "dist/${{ matrix.asset_name }}"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}
        retention-days: 1

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release
        find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
        ls -lh release/

    - name: Generate release tag
      id: tag
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          # Use existing tag
          TAG="${GITHUB_REF#refs/tags/}"
        else
          # Generate timestamp-based tag
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          TAG="release-${TIMESTAMP}"
        fi
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_OUTPUT

    - name: Calculate checksums
      run: |
        cd release
        sha256sum * > SHA256SUMS.txt
        cat SHA256SUMS.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: You Orchestrator ${{ steps.tag.outputs.tag }}
        body: |
          ## You - Autonomous AI Orchestrator for OpenCode

          **Automated build from commit: `${{ github.sha }}`**

          ### 🚀 What's Included

          - ✅ Cross-platform binaries (Windows, Linux, macOS Intel/ARM)
          - ✅ 10 specialized AI agents with autonomous decision-making
          - ✅ **Anti-scope-creep protocol** to prevent over-engineering and budget overruns
          - ✅ **HTTP API integration** for fully autonomous orchestration
          - ✅ **Real-time event streaming** via Server-Sent Events
          - ✅ **Smart retry logic** with exponential backoff for rate limits
          - ✅ **Correct agent routing** with CEO as primary, all others as subagent (v0.1.11+)
          - ✅ Professional skills for software engineering workflows
          - ✅ Web research capabilities via `webfetch` tool
          - ✅ State management with session isolation
          - ✅ Re-orchestration support for iterative development

          ### 📦 Available Builds

          | Platform | Architecture | File |
          |----------|--------------|------|
          | Windows | x64 | `you-windows-amd64.zip` |
          | Linux | x64 | `you-linux-amd64.tar.gz` |
          | macOS | Intel (x64) | `you-darwin-amd64.tar.gz` |
          | macOS | Apple Silicon (ARM64) | `you-darwin-arm64.tar.gz` |

          ### 🎯 Quick Start

          1. Download the appropriate archive for your platform
          2. Extract to a directory
          3. Run `you --presets` to generate agent configurations
          4. Edit `USER_INPUT.md` with your project requirements
          5. Run `you --orchestrate` to start **fully autonomous** orchestration
          6. Watch real-time agent activity stream to your terminal!

          ### 📋 Requirements

          - **OpenCode**: Latest version ([install here](https://opencode.ai/docs/))
          - **GitHub Copilot Pro**: Recommended for unlimited GPT-5 Mini access (0x multiplier = 0 premium requests)
          - **Alternative**: Any OpenCode-supported provider (Anthropic, OpenAI, etc.)

          ### ✨ Key Features

          - **Fully Autonomous Operation**: Zero human intervention required
          - **Scope Control**: CEO and PM agents reject unrequested features to prevent over-engineering
          - **Correct Agent Routing**: CEO as primary agent, all others (including built-in agents) as subagent
          - **HTTP API Integration**: Uses `opencode serve` for programmatic control
          - **Real-time Visibility**: Server-Sent Events stream all agent activity
          - **Resilient Execution**: Automatic retry with exponential backoff (2s → 2min) for rate limits
          - **Activity Monitoring**: Warns if workflow stuck for 10+ minutes
          - **Re-orchestration Support**: Edit requirements and re-run for fresh start
          - **Smart Agents**: Self-sufficient decision-making via webfetch research
          - **Professional Skills**: Production-ready workflows (PRD, code review, security audit, API design, deployment)
          - **Clean Architecture**: SOLID principles, modular Go codebase

          ### 🔄 How It Works

          1. Launches OpenCode HTTP server in background (`opencode serve --port 4096`)
          2. Creates isolated session for your project
          3. Sends async prompt to CEO agent (only primary agent)
          4. Built-in agents (build, plan, explore, etc.) set to subagent to prevent interception
          5. CEO orchestrates entire team (PM → Designer → Architect → Engineers → QA → Security → DevOps → Docs)
          5. Agents enforce anti-scope-creep protocol (only build what user requested)
          6. All file changes, decisions, and tool calls stream to your terminal
          7. Automatic retry on rate limits with smart backoff
          8. Press Ctrl+C to stop, edit requirements, and re-orchestrate

          ### 🛡️ Anti-Over-Engineering Protocol (v0.1.11+)

          - CEO and PM agents **actively reject** unrequested features
          - **Forbidden**: "While we're at it...", "For better UX...", "To future-proof..."
          - **Enforced**: Only build what user explicitly requested
          - **Result**: Prevents scope creep, saves time and budget

          ### ✨ New in v0.1.13

          - **Fixed**: Workspace organization - agents now respect project folder requirements (e.g., "test-project")
          - **Enhanced**: CEO reads USER_INPUT.md for workspace requirements and enforces them
          - **Enhanced**: PM, Architect, Lead Engineer, and SWE all enforce correct file paths
          - **Enhanced**: No more stray files at root - clean, organized workspaces
          - **Enhanced**: Completion message shows actual project folder and build commands

          ### ✨ Previous (v0.1.12)

          - **Fixed**: Infinite approval loops - agents now operate fully autonomously
          - **Fixed**: Artifact creation - agents explicitly create files in .you/artifacts/
          - **Fixed**: CEO completion detection - gracefully ends session when work is done
          - **Enhanced**: All 10 agents have universal autonomous operation rules
          - **Enhanced**: CEO outputs clear success message with deliverables summary

          ### 🔐 Verification

          Verify your download with SHA256 checksums in `SHA256SUMS.txt`

          ---

          **Build Date:** ${{ steps.tag.outputs.timestamp }}  
          **Commit:** `${{ github.sha }}`  
          **Go Version:** 1.21+

          📖 [Full Documentation](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/README.md) | 🚀 [Quick Start Guide](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/QUICKSTART.md) | 🏗️ [Technical Details](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/TECHNICAL_DETAILS.md)
        files: |
          release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
